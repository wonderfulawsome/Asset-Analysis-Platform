<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passive — User Stats</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0A0E17;
      --panel: #0F1923;
      --panel-alt: #121D2B;
      --border: #1C2B3A;
      --border-light: #253546;
      --text: #D1D5DB;
      --text-bright: #F1F5F9;
      --sub: #6B7B8D;
      --orange: #FF8C00;
      --green: #00D26A;
      --blue: #3B82F6;
      --red: #FF3B30;
      --cyan: #22D3EE;
      --amber: #FBBF24;
    }

    body {
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Top bar ── */
    .top-bar {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .top-bar-logo {
      color: var(--orange);
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 1px;
    }
    .top-bar-sep {
      color: var(--border-light);
      font-size: 14px;
    }
    .top-bar-title {
      color: var(--sub);
      font-size: 11px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .top-bar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .top-bar-time {
      color: var(--sub);
      font-size: 11px;
    }
    .back-link {
      color: var(--sub);
      text-decoration: none;
      font-size: 11px;
      letter-spacing: 0.5px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--orange); }

    /* ── Container ── */
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 12px 12px 40px;
    }

    /* ── Section header ── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 16px 0 8px;
    }
    .section-indicator {
      width: 3px;
      height: 14px;
      border-radius: 1px;
    }
    .section-indicator.orange { background: var(--orange); }
    .section-indicator.green { background: var(--green); }
    .section-indicator.blue { background: var(--blue); }
    .section-indicator.cyan { background: var(--cyan); }
    .section-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--sub);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    /* ── Date nav ── */
    .date-nav {
      display: flex;
      align-items: center;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .date-nav button {
      background: none;
      border: none;
      border-right: 1px solid var(--border);
      color: var(--sub);
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      padding: 10px 14px;
      transition: all 0.15s;
      line-height: 1;
    }
    .date-nav button:last-child {
      border-right: none;
      border-left: 1px solid var(--border);
    }
    .date-nav button:hover {
      background: var(--panel-alt);
      color: var(--orange);
    }
    .date-nav-label {
      flex: 1;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-bright);
      letter-spacing: 0.5px;
    }
    .refresh-btn {
      background: none;
      border: none;
      border-left: 1px solid var(--border);
      color: var(--sub);
      font-size: 14px;
      cursor: pointer;
      padding: 10px 14px;
      transition: all 0.15s;
      line-height: 1;
      display: flex;
      align-items: center;
    }
    .refresh-btn:hover { background: var(--panel-alt); color: var(--orange); }
    .refresh-btn.spinning svg { animation: spin 0.6s linear infinite; }

    /* ── KPI Grid ── */
    .kpi-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .kpi-cell {
      background: var(--panel);
      padding: 14px 16px;
      position: relative;
    }
    .kpi-cell::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 100%;
    }
    .kpi-cell.c-orange::after { background: var(--orange); }
    .kpi-cell.c-blue::after { background: var(--blue); }
    .kpi-cell.c-green::after { background: var(--green); }
    .kpi-cell.c-cyan::after { background: var(--cyan); }

    .kpi-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--sub);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .kpi-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .kpi-value {
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .kpi-value.orange { color: var(--orange); }
    .kpi-value.blue { color: var(--blue); }
    .kpi-value.green { color: var(--green); }
    .kpi-value.cyan { color: var(--cyan); }
    .kpi-unit {
      font-size: 11px;
      color: var(--sub);
    }

    /* ── Ratio panel ── */
    .ratio-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .ratio-bar-wrap {
      height: 6px;
      border-radius: 3px;
      background: rgba(255,255,255,0.03);
      overflow: hidden;
      display: flex;
      margin-bottom: 10px;
    }
    .ratio-bar-new {
      background: var(--green);
      height: 100%;
      transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .ratio-bar-return {
      background: var(--blue);
      height: 100%;
      transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .ratio-legend {
      display: flex;
      justify-content: space-between;
    }
    .ratio-legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--sub);
    }
    .ratio-dot {
      width: 6px;
      height: 6px;
      border-radius: 1px;
    }
    .ratio-dot.new { background: var(--green); }
    .ratio-dot.ret { background: var(--blue); }
    .ratio-count {
      font-weight: 700;
      color: var(--text-bright);
    }

    /* ── Bar chart ── */
    .chart-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .chart-bars {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 100px;
      padding-top: 4px;
    }
    .chart-bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      height: 100%;
      justify-content: flex-end;
    }
    .chart-bar {
      width: 100%;
      border-radius: 2px 2px 0 0;
      background: var(--orange);
      min-height: 2px;
      transition: height 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      opacity: 0.6;
    }
    .chart-bar.today {
      opacity: 1;
      box-shadow: 0 0 8px rgba(255,140,0,0.3);
    }
    .chart-bar-label {
      font-size: 10px;
      color: var(--sub);
      font-weight: 600;
    }
    .chart-bar-value {
      font-size: 10px;
      color: var(--text);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    /* ── Status row ── */
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-bottom: 12px;
    }
    .status-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--sub);
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Loading ── */
    .loading {
      text-align: center;
      padding: 60px 0;
      color: var(--sub);
      font-size: 12px;
    }
    .loading-spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Fade in ── */
    .fade-in {
      opacity: 0;
      transform: translateY(8px);
      animation: fadeUp 0.4s ease forwards;
    }
    .fade-in:nth-child(1) { animation-delay: 0.05s; }
    .fade-in:nth-child(2) { animation-delay: 0.1s; }
    .fade-in:nth-child(3) { animation-delay: 0.15s; }
    .fade-in:nth-child(4) { animation-delay: 0.2s; }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="top-bar">
    <div class="top-bar-left">
      <span class="top-bar-logo">PASSIVE</span>
      <span class="top-bar-sep">|</span>
      <span class="top-bar-title">User Analytics</span>
    </div>
    <div class="top-bar-right">
      <span class="top-bar-time" id="live-time"></span>
      <a href="/" class="back-link">← MAIN</a>
    </div>
  </div>

  <div class="container">

    <!-- Date nav -->
    <div class="date-nav" style="margin-top:12px;">
      <button id="prev-day" title="이전 날짜">◀</button>
      <span class="date-nav-label" id="date-label"></span>
      <button id="next-day" title="다음 날짜">▶</button>
      <button class="refresh-btn" id="refresh-btn" title="새로고침">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 1v5h5"/><path d="M1 6C2.1 3.2 4.8 1.3 8 1.3c3.7 0 6.7 3 6.7 6.7s-3 6.7-6.7 6.7c-2.7 0-5-1.6-6.1-3.9"/></svg>
      </button>
    </div>

    <!-- Loading -->
    <div id="loading" class="loading">
      <div class="loading-spinner"></div>
      LOADING DATA...
    </div>

    <!-- Stats content -->
    <div id="stats-content" style="display:none;">

      <!-- KPI -->
      <div class="section-header">
        <div class="section-indicator orange"></div>
        <span class="section-label">Key Metrics</span>
      </div>
      <div class="kpi-grid fade-in">
        <div class="kpi-cell c-orange">
          <div class="kpi-label">DAU (Today)</div>
          <div class="kpi-row">
            <div class="kpi-value orange" id="dau">0</div>
            <span class="kpi-unit">users</span>
          </div>
        </div>
        <div class="kpi-cell c-blue">
          <div class="kpi-label">MAU (Month)</div>
          <div class="kpi-row">
            <div class="kpi-value blue" id="mau">0</div>
            <span class="kpi-unit">users</span>
          </div>
        </div>
        <div class="kpi-cell c-green">
          <div class="kpi-label">New Users</div>
          <div class="kpi-row">
            <div class="kpi-value green" id="new-users">0</div>
            <span class="kpi-unit">new</span>
          </div>
        </div>
        <div class="kpi-cell c-cyan">
          <div class="kpi-label">Returning</div>
          <div class="kpi-row">
            <div class="kpi-value cyan" id="returning-users">0</div>
            <span class="kpi-unit">ret</span>
          </div>
        </div>
      </div>

      <!-- Ratio -->
      <div class="section-header">
        <div class="section-indicator green"></div>
        <span class="section-label">New vs Returning</span>
      </div>
      <div class="ratio-panel fade-in">
        <div class="ratio-bar-wrap">
          <div class="ratio-bar-new" id="ratio-new" style="width:0%"></div>
          <div class="ratio-bar-return" id="ratio-return" style="width:0%"></div>
        </div>
        <div class="ratio-legend">
          <div class="ratio-legend-item">
            <span class="ratio-dot new"></span>
            NEW <span class="ratio-count" id="ratio-new-pct">0%</span>
          </div>
          <div class="ratio-legend-item">
            <span class="ratio-dot ret"></span>
            RETURN <span class="ratio-count" id="ratio-ret-pct">0%</span>
          </div>
        </div>
      </div>

      <!-- 7-day chart -->
      <div class="section-header">
        <div class="section-indicator blue"></div>
        <span class="section-label">7-Day DAU Trend</span>
      </div>
      <div class="chart-panel fade-in">
        <div class="chart-bars" id="chart-bars"></div>
      </div>

      <!-- Status -->
      <div class="status-row fade-in">
        <div class="status-item">
          <span class="status-dot"></span>
          LIVE
        </div>
        <div class="status-item" id="last-update"></div>
      </div>

    </div>
  </div>

  <script>
    const API_BASE = '/api/tracking';

    // Live clock
    function updateClock() {
      const now = new Date();
      const kst = new Date(now.getTime() + (9 * 60 * 60 * 1000));
      const h = String(kst.getUTCHours()).padStart(2,'0');
      const m = String(kst.getUTCMinutes()).padStart(2,'0');
      const s = String(kst.getUTCSeconds()).padStart(2,'0');
      document.getElementById('live-time').textContent = `KST ${h}:${m}:${s}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // KST today
    function getKSTToday() {
      const now = new Date();
      const kst = new Date(now.getTime() + (9 * 60 * 60 * 1000));
      return new Date(kst.getUTCFullYear(), kst.getUTCMonth(), kst.getUTCDate());
    }
    let currentDate = getKSTToday();

    function formatDate(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }
    function formatMonth(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      return `${y}-${m}`;
    }
    function formatDisplay(d) {
      const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
      const m = String(d.getMonth()+1).padStart(2,'0');
      const day = String(d.getDate()).padStart(2,'0');
      return `${d.getFullYear()}.${m}.${day} ${days[d.getDay()]}`;
    }

    function updateDateUI() {
      document.getElementById('date-label').textContent = formatDisplay(currentDate);
    }

    async function fetchStats() {
      const loading = document.getElementById('loading');
      const content = document.getElementById('stats-content');
      loading.style.display = '';
      content.style.display = 'none';

      try {
        const d = formatDate(currentDate);
        const m = formatMonth(currentDate);
        const resp = await fetch(`${API_BASE}/stats?d=${d}&m=${m}`);
        const data = await resp.json();

        document.getElementById('dau').textContent = data.dau ?? 0;
        document.getElementById('mau').textContent = data.mau ?? 0;
        document.getElementById('new-users').textContent = data.new_users ?? 0;
        document.getElementById('returning-users').textContent = data.returning_users ?? 0;

        const total = (data.new_users || 0) + (data.returning_users || 0);
        const newPct = total > 0 ? Math.round((data.new_users / total) * 100) : 0;
        const retPct = total > 0 ? 100 - newPct : 0;
        document.getElementById('ratio-new').style.width = newPct + '%';
        document.getElementById('ratio-return').style.width = retPct + '%';
        document.getElementById('ratio-new-pct').textContent = newPct + '%';
        document.getElementById('ratio-ret-pct').textContent = retPct + '%';

        animateNumbers(data);

        const lastUp = document.getElementById('last-update');
        if (lastUp) {
          const now = new Date();
          const kst = new Date(now.getTime() + (9*60*60*1000));
          const h = String(kst.getUTCHours()).padStart(2,'0');
          const mi = String(kst.getUTCMinutes()).padStart(2,'0');
          lastUp.textContent = `UPDATED ${h}:${mi} KST`;
        }

        loading.style.display = 'none';
        content.style.display = '';

        load7DayChart();
      } catch (err) {
        loading.innerHTML = '<div style="color:var(--red);font-size:12px">ERR: FETCH FAILED</div><div style="margin-top:6px;font-size:10px;color:var(--sub)">' + err.message + '</div>';
      }
    }

    function animateNumbers(data) {
      const targets = [
        { id: 'dau', val: data.dau ?? 0 },
        { id: 'mau', val: data.mau ?? 0 },
        { id: 'new-users', val: data.new_users ?? 0 },
        { id: 'returning-users', val: data.returning_users ?? 0 },
      ];
      targets.forEach(t => {
        const el = document.getElementById(t.id);
        const end = t.val;
        if (end === 0) { el.textContent = '0'; return; }
        const duration = 500;
        const startTime = performance.now();
        function tick(now) {
          const elapsed = now - startTime;
          const progress = Math.min(elapsed / duration, 1);
          const ease = 1 - Math.pow(1 - progress, 3);
          el.textContent = Math.round(ease * end).toLocaleString();
          if (progress < 1) requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      });
    }

    async function load7DayChart() {
      const container = document.getElementById('chart-bars');
      container.innerHTML = '';
      const days = [];

      for (let i = 6; i >= 0; i--) {
        const d = new Date(currentDate);
        d.setDate(d.getDate() - i);
        days.push(d);
      }

      const results = await Promise.all(days.map(async (d) => {
        try {
          const resp = await fetch(`${API_BASE}/stats?d=${formatDate(d)}&m=${formatMonth(d)}`);
          const data = await resp.json();
          return { date: d, dau: data.dau ?? 0 };
        } catch {
          return { date: d, dau: 0 };
        }
      }));

      const maxDau = Math.max(...results.map(r => r.dau), 1);
      const dayNames = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

      results.forEach((r, idx) => {
        const col = document.createElement('div');
        col.className = 'chart-bar-col';

        const val = document.createElement('div');
        val.className = 'chart-bar-value';
        val.textContent = r.dau;

        const bar = document.createElement('div');
        bar.className = 'chart-bar' + (idx === results.length - 1 ? ' today' : '');
        bar.style.height = '0%';

        const label = document.createElement('div');
        label.className = 'chart-bar-label';
        label.textContent = dayNames[r.date.getDay()];

        col.appendChild(val);
        col.appendChild(bar);
        col.appendChild(label);
        container.appendChild(col);

        requestAnimationFrame(() => {
          setTimeout(() => {
            bar.style.height = Math.max((r.dau / maxDau) * 100, 3) + '%';
          }, idx * 60);
        });
      });
    }

    // Navigation
    document.getElementById('prev-day').addEventListener('click', () => {
      currentDate.setDate(currentDate.getDate() - 1);
      updateDateUI();
      fetchStats();
    });
    document.getElementById('next-day').addEventListener('click', () => {
      const today = getKSTToday();
      if (currentDate < today) {
        currentDate.setDate(currentDate.getDate() + 1);
        updateDateUI();
        fetchStats();
      }
    });
    document.getElementById('refresh-btn').addEventListener('click', function() {
      this.classList.add('spinning');
      fetchStats().finally(() => {
        setTimeout(() => this.classList.remove('spinning'), 500);
      });
    });

    // Init
    updateDateUI();
    fetchStats();
  </script>
</body>
</html>
