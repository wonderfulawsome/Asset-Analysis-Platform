<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PASSIVE ANALYTICS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #06060a;
      --surface: #0c0c12;
      --surface2: #131318;
      --border: #1e1e28;
      --text: #c8c8d0;
      --text-hi: #ffffff;
      --dim: #4a4a58;
      --orange: #ff8c00;
      --green: #00d26a;
      --blue: #448aff;
      --red: #ff3b30;
      --yellow: #ffd600;
      --mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'Menlo', monospace;
      --sans: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ═══ AMBIENT ═══ */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 1000px; height: 600px;
      background: radial-gradient(ellipse, rgba(255,140,0,0.07) 0%, rgba(255,140,0,0.02) 40%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: ambientBreath 8s ease-in-out infinite;
    }
    @keyframes ambientBreath {
      0%, 100% { opacity: 0.5; transform: translateX(-50%) scale(1); }
      50% { opacity: 1; transform: translateX(-50%) scale(1.2); }
    }

    /* ═══ TOP BAR ═══ */
    .topbar {
      background: rgba(12,12,18,0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 2px solid var(--orange);
      box-shadow: 0 2px 20px rgba(255,140,0,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 44px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-tag {
      background: var(--orange);
      color: #000;
      font-family: var(--mono);
      font-weight: 800;
      font-size: 11px;
      letter-spacing: 2px;
      padding: 4px 10px;
    }
    .topbar-sub {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 1px;
    }
    .topbar-right { display: flex; align-items: center; gap: 16px; }
    .topbar-clock {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--orange);
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 8px rgba(255,140,0,0.3);
    }
    .topbar-link {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--dim);
      text-decoration: none;
      padding: 4px 12px;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }
    .topbar-link:hover {
      color: var(--orange);
      border-color: var(--orange);
      box-shadow: 0 0 12px rgba(255,140,0,0.15);
    }

    /* ═══ LAYOUT ═══ */
    .layout {
      position: relative; z-index: 1;
      padding: 16px 24px;
    }
    @media (min-width: 1400px) { .layout { padding: 20px 48px; } }
    @media (max-width: 640px) { .layout { padding: 10px; } }

    /* ═══ COMMAND BAR ═══ */
    .cmd-bar {
      display: flex;
      align-items: stretch;
      background: var(--border);
      gap: 1px;
      margin-bottom: 14px;
    }
    .cmd-btn {
      background: var(--surface);
      border: none;
      color: var(--dim);
      font-family: var(--mono);
      font-size: 14px;
      cursor: pointer;
      padding: 0 20px;
      transition: all 0.15s;
      line-height: 42px;
    }
    .cmd-btn:hover { background: var(--surface2); color: var(--orange); }
    .cmd-btn:active { transform: scale(0.95); }
    .cmd-date {
      flex: 1;
      background: var(--surface);
      text-align: center;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      color: var(--text-hi);
      line-height: 42px;
      letter-spacing: 0.5px;
    }
    .cmd-refresh {
      background: var(--surface);
      border: none;
      color: var(--dim);
      cursor: pointer;
      padding: 0 16px;
      display: flex;
      align-items: center;
      transition: all 0.15s;
    }
    .cmd-refresh:hover { color: var(--orange); background: var(--surface2); }
    .cmd-refresh.spinning svg { animation: spin 0.5s linear infinite; }

    /* ═══ PANEL ═══ */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .panel:hover {
      border-color: #2a2a38;
      box-shadow: 0 4px 30px rgba(0,0,0,0.4);
    }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .panel-label {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      color: var(--orange);
      letter-spacing: 1px;
    }
    .panel-tag {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 0.5px;
    }
    .panel-body { padding: 20px; }
    @media (min-width: 1200px) { .panel-body { padding: 28px; } }

    /* ═══ KPI GRID ═══ */
    .kpi-panel { margin-bottom: 14px; }
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
    }
    @media (max-width: 640px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }

    .kpi-cell {
      background: var(--surface);
      padding: 28px 22px;
      position: relative;
      overflow: hidden;
      transition: background 0.3s;
    }
    .kpi-cell:hover { background: var(--surface2); }
    /* 상단 컬러 바 */
    .kpi-cell::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      transition: box-shadow 0.3s;
    }
    /* 배경 글로우 */
    .kpi-cell::after {
      content: '';
      position: absolute;
      top: -40px; left: 50%;
      transform: translateX(-50%);
      width: 150px; height: 80px;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }
    .kpi-cell:hover::after { opacity: 1; }

    .kpi-cell:nth-child(1)::before { background: var(--orange); }
    .kpi-cell:nth-child(2)::before { background: var(--blue); }
    .kpi-cell:nth-child(3)::before { background: var(--green); }
    .kpi-cell:nth-child(4)::before { background: var(--yellow); }
    .kpi-cell:nth-child(1):hover::before { box-shadow: 0 0 20px rgba(255,140,0,0.5); }
    .kpi-cell:nth-child(2):hover::before { box-shadow: 0 0 20px rgba(68,138,255,0.5); }
    .kpi-cell:nth-child(3):hover::before { box-shadow: 0 0 20px rgba(0,210,106,0.5); }
    .kpi-cell:nth-child(4):hover::before { box-shadow: 0 0 20px rgba(255,214,0,0.5); }
    .kpi-cell:nth-child(1)::after { background: radial-gradient(ellipse, rgba(255,140,0,0.08), transparent); }
    .kpi-cell:nth-child(2)::after { background: radial-gradient(ellipse, rgba(68,138,255,0.08), transparent); }
    .kpi-cell:nth-child(3)::after { background: radial-gradient(ellipse, rgba(0,210,106,0.08), transparent); }
    .kpi-cell:nth-child(4)::after { background: radial-gradient(ellipse, rgba(255,214,0,0.08), transparent); }

    .kpi-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--dim);
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      position: relative;
    }
    @media (min-width: 1200px) {
      .kpi-label { font-size: 12px; }
      .kpi-cell { padding: 34px 28px; }
    }
    .kpi-val {
      font-family: var(--mono);
      font-size: 42px;
      font-weight: 700;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      position: relative;
    }
    @media (min-width: 1200px) { .kpi-val { font-size: 56px; } }
    .kpi-val.c-orange { color: var(--orange); text-shadow: 0 0 24px rgba(255,140,0,0.25); }
    .kpi-val.c-blue { color: var(--blue); text-shadow: 0 0 24px rgba(68,138,255,0.25); }
    .kpi-val.c-green { color: var(--green); text-shadow: 0 0 24px rgba(0,210,106,0.25); }
    .kpi-val.c-yellow { color: var(--yellow); text-shadow: 0 0 24px rgba(255,214,0,0.25); }
    .kpi-unit {
      font-family: var(--sans);
      font-size: 14px;
      color: var(--dim);
      margin-left: 3px;
    }

    /* ═══ GRID ROW ═══ */
    .grid-row {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }
    .grid-row .panel { margin-bottom: 0; }
    @media (max-width: 900px) { .grid-row { grid-template-columns: 1fr; } }

    /* ═══ DONUT CHART ═══ */
    .donut-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .donut-svg {
      width: 160px; height: 160px;
      transform: rotate(-90deg);
    }
    @media (min-width: 1200px) { .donut-svg { width: 200px; height: 200px; } }
    .donut-track {
      fill: none;
      stroke: rgba(255,255,255,0.04);
      stroke-width: 18;
    }
    .donut-new {
      fill: none;
      stroke: var(--green);
      stroke-width: 18;
      stroke-linecap: butt;
      filter: drop-shadow(0 0 6px rgba(0,210,106,0.3));
      transition: stroke-dasharray 1s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .donut-ret {
      fill: none;
      stroke: var(--blue);
      stroke-width: 18;
      stroke-linecap: butt;
      filter: drop-shadow(0 0 6px rgba(68,138,255,0.3));
      transition: stroke-dasharray 1s cubic-bezier(0.16, 1, 0.3, 1), stroke-dashoffset 1s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .donut-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    .donut-center-val {
      font-family: var(--mono);
      font-size: 28px;
      font-weight: 700;
      color: var(--text-hi);
    }
    .donut-center-label {
      font-size: 11px;
      color: var(--dim);
      margin-top: 2px;
    }
    .donut-container {
      position: relative;
      display: inline-block;
    }
    .donut-legend {
      display: flex;
      gap: 24px;
      justify-content: center;
    }
    .donut-legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--dim);
    }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
    .legend-dot.g { background: var(--green); box-shadow: 0 0 6px rgba(0,210,106,0.3); }
    .legend-dot.b { background: var(--blue); box-shadow: 0 0 6px rgba(68,138,255,0.3); }
    .legend-pct {
      font-family: var(--mono);
      font-weight: 700;
      font-size: 15px;
      color: var(--text-hi);
    }

    /* ═══ 7-DAY CHART ═══ */
    .chart-bars {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      height: 300px;
    }
    @media (min-width: 1200px) { .chart-bars { height: 360px; } }
    @media (max-width: 640px) { .chart-bars { height: 220px; } }
    .bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      height: 300px;
      justify-content: flex-end;
    }
    @media (min-width: 1200px) { .bar-col { height: 360px; } }
    @media (max-width: 640px) { .bar-col { height: 220px; } }
    .bar-val {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.4s, transform 0.4s;
    }
    .bar-val.show { opacity: 1; transform: translateY(0); }
    @media (min-width: 1200px) { .bar-val { font-size: 14px; } }
    .bar-fill {
      width: 100%;
      min-height: 4px;
      border-radius: 3px 3px 0 0;
      transition: height 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
    }
    .bar-fill.dim {
      background: linear-gradient(to top, rgba(255,140,0,0.10), rgba(255,140,0,0.25));
    }
    .bar-fill.today {
      background: linear-gradient(to top, #cc7000, var(--orange), #ffaa33);
      box-shadow: 0 0 24px rgba(255,140,0,0.3), 0 0 8px rgba(255,140,0,0.15);
    }
    .bar-fill:hover { filter: brightness(1.25); }
    .bar-day {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--dim);
    }
    .bar-col:last-child .bar-day { color: var(--orange); font-weight: 700; }
    @media (min-width: 1200px) { .bar-day { font-size: 12px; } }

    /* ═══ STATUS BAR ═══ */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--orange);
    }
    .status-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--dim);
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px rgba(0,210,106,0.5);
      animation: pulse 2s ease-in-out infinite;
    }
    .status-live { color: var(--green); font-weight: 700; }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px rgba(0,210,106,0.5); }
      50% { opacity: 0.3; box-shadow: 0 0 4px rgba(0,210,106,0.2); }
    }

    /* ═══ FN BAR ═══ */
    .fn-bar {
      display: flex;
      gap: 1px;
      background: var(--border);
      margin-top: 14px;
    }
    .fn-key {
      flex: 1;
      background: var(--surface);
      text-align: center;
      padding: 7px 0;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--dim);
      cursor: default;
      user-select: none;
      transition: background 0.15s;
    }
    .fn-key:hover { background: var(--surface2); color: var(--text); }
    .fn-key span { color: var(--orange); font-weight: 700; }
    @media (max-width: 640px) { .fn-bar { display: none; } }

    /* ═══ LOADING ═══ */
    .loading-wrap {
      text-align: center;
      padding: 100px 0;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--dim);
    }
    .ld-spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 14px;
      box-shadow: 0 0 12px rgba(255,140,0,0.15);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ═══ REVEAL ═══ */
    .reveal {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1),
                  transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .reveal.show { opacity: 1; transform: translateY(0); }
    .reveal.d1 { transition-delay: 0.06s; }
    .reveal.d2 { transition-delay: 0.18s; }
    .reveal.d3 { transition-delay: 0.30s; }
    .reveal.d4 { transition-delay: 0.42s; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-tag">PASSIVE</span>
      <span class="topbar-sub">ANALYTICS</span>
    </div>
    <div class="topbar-right">
      <span class="topbar-clock" id="live-clock"></span>
      <a href="/" class="topbar-link">← 메인</a>
    </div>
  </div>

  <div class="layout">

    <div class="cmd-bar">
      <button class="cmd-btn" id="prev-day">◀</button>
      <div class="cmd-date" id="date-label"></div>
      <button class="cmd-btn" id="next-day">▶</button>
      <button class="cmd-refresh" id="refresh-btn" title="새로고침">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 1v5h5"/><path d="M1 6C2.1 3.2 4.8 1.3 8 1.3c3.7 0 6.7 3 6.7 6.7s-3 6.7-6.7 6.7c-2.7 0-5-1.6-6.1-3.9"/></svg>
      </button>
    </div>

    <div id="loading" class="loading-wrap">
      <div class="ld-spinner"></div>
      데이터 로딩 중 ...
    </div>

    <div id="stats-content" style="display:none;">

      <!-- KPI -->
      <div class="kpi-panel panel reveal d1">
        <div class="panel-head">
          <span class="panel-label">핵심 지표</span>
          <span class="panel-tag">KEY METRICS</span>
        </div>
        <div class="kpi-grid">
          <div class="kpi-cell">
            <div class="kpi-label">DAU (오늘)</div>
            <div><span class="kpi-val c-orange" id="dau">0</span><span class="kpi-unit">명</span></div>
          </div>
          <div class="kpi-cell">
            <div class="kpi-label">MAU (월간)</div>
            <div><span class="kpi-val c-blue" id="mau">0</span><span class="kpi-unit">명</span></div>
          </div>
          <div class="kpi-cell">
            <div class="kpi-label">신규 사용자</div>
            <div><span class="kpi-val c-green" id="new-users">0</span><span class="kpi-unit">명</span></div>
          </div>
          <div class="kpi-cell">
            <div class="kpi-label">재방문 사용자</div>
            <div><span class="kpi-val c-yellow" id="returning-users">0</span><span class="kpi-unit">명</span></div>
          </div>
        </div>
      </div>

      <!-- Donut + Chart -->
      <div class="grid-row">

        <!-- 도넛 차트 -->
        <div class="panel reveal d2">
          <div class="panel-head">
            <span class="panel-label">신규 vs 재방문</span>
            <span class="panel-tag">RATIO</span>
          </div>
          <div class="panel-body">
            <div class="donut-wrap">
              <div class="donut-container">
                <svg class="donut-svg" viewBox="0 0 200 200">
                  <circle class="donut-track" cx="100" cy="100" r="70"/>
                  <circle class="donut-new" id="donut-new" cx="100" cy="100" r="70" stroke-dasharray="0 440"/>
                  <circle class="donut-ret" id="donut-ret" cx="100" cy="100" r="70" stroke-dasharray="0 440" stroke-dashoffset="0"/>
                </svg>
                <div class="donut-center">
                  <div class="donut-center-val" id="donut-total">0</div>
                  <div class="donut-center-label">총 방문</div>
                </div>
              </div>
              <div class="donut-legend">
                <div class="donut-legend-item">
                  <span class="legend-dot g"></span>
                  신규 <span class="legend-pct" id="ratio-new-pct">0%</span>
                </div>
                <div class="donut-legend-item">
                  <span class="legend-dot b"></span>
                  재방문 <span class="legend-pct" id="ratio-ret-pct">0%</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- 7일 차트 -->
        <div class="panel reveal d3">
          <div class="panel-head">
            <span class="panel-label">최근 7일 추이</span>
            <span class="panel-tag">DAU TREND</span>
          </div>
          <div class="panel-body" style="display:flex; flex-direction:column;">
            <div class="chart-bars" id="chart-bars"></div>
          </div>
        </div>

      </div>

      <!-- Status -->
      <div class="status-bar reveal d4">
        <div class="status-item">
          <span class="status-dot"></span>
          <span class="status-live">LIVE</span>
        </div>
        <div class="status-item" id="last-update"></div>
      </div>

      <div class="fn-bar reveal d4">
        <div class="fn-key"><span>F1</span> 도움말</div>
        <div class="fn-key"><span>F2</span> 새로고침</div>
        <div class="fn-key"><span>F3</span> 메인</div>
        <div class="fn-key"><span>F5</span> 전일</div>
        <div class="fn-key"><span>F6</span> 익일</div>
      </div>

    </div>
  </div>

  <script>
    const API = '/api/tracking';
    const CIRC = 2 * Math.PI * 70; /* donut circumference */

    /* ── Clock ── */
    function tickClock() {
      const now = new Date();
      const kst = new Date(now.getTime() + 9 * 3600000);
      const pad = n => String(n).padStart(2, '0');
      document.getElementById('live-clock').textContent =
        pad(kst.getUTCHours()) + ':' + pad(kst.getUTCMinutes()) + ':' + pad(kst.getUTCSeconds()) + ' KST';
    }
    setInterval(tickClock, 1000);
    tickClock();

    /* ── Date ── */
    function getKSTToday() {
      const now = new Date();
      const kst = new Date(now.getTime() + 9 * 3600000);
      return new Date(kst.getUTCFullYear(), kst.getUTCMonth(), kst.getUTCDate());
    }
    let currentDate = getKSTToday();
    const pad2 = n => String(n).padStart(2, '0');
    const fmtDate = d => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
    const fmtMonth = d => `${d.getFullYear()}-${pad2(d.getMonth()+1)}`;
    const dayKo = ['일','월','화','수','목','금','토'];
    const fmtDisplay = d => `${d.getFullYear()}. ${d.getMonth()+1}. ${d.getDate()}. (${dayKo[d.getDay()]})`;
    function updateDateUI() { document.getElementById('date-label').textContent = fmtDisplay(currentDate); }

    /* ── Reveal ── */
    function triggerReveal() {
      requestAnimationFrame(() => {
        document.querySelectorAll('.reveal').forEach(el => el.classList.add('show'));
      });
    }

    /* ── Fetch ── */
    async function fetchStats() {
      const $ld = document.getElementById('loading');
      const $ct = document.getElementById('stats-content');
      $ld.style.display = '';
      $ct.style.display = 'none';
      document.querySelectorAll('.reveal').forEach(el => el.classList.remove('show'));

      try {
        const d = fmtDate(currentDate), m = fmtMonth(currentDate);
        const res = await fetch(`${API}/stats?d=${d}&m=${m}`);
        const data = await res.json();

        animateNum('dau', data.dau ?? 0);
        animateNum('mau', data.mau ?? 0);
        animateNum('new-users', data.new_users ?? 0);
        animateNum('returning-users', data.returning_users ?? 0);

        /* Donut */
        const nw = data.new_users || 0, rt = data.returning_users || 0;
        const total = nw + rt;
        const nPct = total > 0 ? Math.round((nw / total) * 100) : 0;
        const rPct = total > 0 ? 100 - nPct : 0;
        const nLen = total > 0 ? (nw / total) * CIRC : 0;
        const rLen = total > 0 ? (rt / total) * CIRC : 0;

        document.getElementById('donut-new').setAttribute('stroke-dasharray', `${nLen} ${CIRC}`);
        document.getElementById('donut-ret').setAttribute('stroke-dasharray', `${rLen} ${CIRC}`);
        document.getElementById('donut-ret').setAttribute('stroke-dashoffset', `-${nLen}`);
        document.getElementById('donut-total').textContent = total;
        document.getElementById('ratio-new-pct').textContent = nPct + '%';
        document.getElementById('ratio-ret-pct').textContent = rPct + '%';

        /* Update time */
        const now = new Date();
        const kst = new Date(now.getTime() + 9 * 3600000);
        document.getElementById('last-update').textContent =
          'UPDATE ' + pad2(kst.getUTCHours()) + ':' + pad2(kst.getUTCMinutes()) + ' KST';

        $ld.style.display = 'none';
        $ct.style.display = '';
        triggerReveal();
        load7Day();
      } catch (err) {
        $ld.innerHTML = '<div style="color:var(--red)">데이터 로드 실패</div><div style="margin-top:8px;font-size:11px;color:var(--dim)">' + err.message + '</div>';
      }
    }

    /* ── Number animation ── */
    function animateNum(id, end) {
      const el = document.getElementById(id);
      if (end === 0) { el.textContent = '0'; return; }
      const t0 = performance.now(), dur = 800;
      (function tick(now) {
        const p = Math.min((now - t0) / dur, 1);
        const ease = 1 - Math.pow(1 - p, 4);
        el.textContent = Math.round(ease * end).toLocaleString();
        if (p < 1) requestAnimationFrame(tick);
      })(t0);
    }

    /* ── 7-day chart ── */
    async function load7Day() {
      const $c = document.getElementById('chart-bars');
      $c.innerHTML = '';
      const days = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date(currentDate);
        d.setDate(d.getDate() - i);
        days.push(d);
      }

      const results = await Promise.all(days.map(async d => {
        try {
          const r = await fetch(`${API}/stats?d=${fmtDate(d)}&m=${fmtMonth(d)}`);
          const j = await r.json();
          return { date: d, dau: j.dau ?? 0 };
        } catch { return { date: d, dau: 0 }; }
      }));

      const max = Math.max(...results.map(r => r.dau), 1);

      results.forEach((r, i) => {
        const isToday = i === results.length - 1;
        const col = document.createElement('div');
        col.className = 'bar-col';

        const val = document.createElement('div');
        val.className = 'bar-val';
        val.textContent = r.dau;

        const bar = document.createElement('div');
        bar.className = 'bar-fill ' + (isToday ? 'today' : 'dim');
        bar.style.height = '0%';

        const lbl = document.createElement('div');
        lbl.className = 'bar-day';
        lbl.textContent = dayKo[r.date.getDay()];

        col.appendChild(val);
        col.appendChild(bar);
        col.appendChild(lbl);
        $c.appendChild(col);

        requestAnimationFrame(() => {
          setTimeout(() => {
            /* sqrt 스케일: 작은 값도 눈에 보이게 */
            const ratio = r.dau > 0 ? Math.sqrt(r.dau / max) * 100 : 0;
            bar.style.height = Math.max(ratio, 8) + '%';
            val.classList.add('show');
          }, 200 + i * 90);
        });
      });
    }

    /* ── Navigation ── */
    document.getElementById('prev-day').addEventListener('click', () => {
      currentDate.setDate(currentDate.getDate() - 1);
      updateDateUI(); fetchStats();
    });
    document.getElementById('next-day').addEventListener('click', () => {
      if (currentDate < getKSTToday()) {
        currentDate.setDate(currentDate.getDate() + 1);
        updateDateUI(); fetchStats();
      }
    });
    document.getElementById('refresh-btn').addEventListener('click', function () {
      this.classList.add('spinning');
      fetchStats().finally(() => setTimeout(() => this.classList.remove('spinning'), 500));
    });

    /* ── Keyboard ── */
    document.addEventListener('keydown', e => {
      if (e.key === 'F2') { e.preventDefault(); document.getElementById('refresh-btn').click(); }
      if (e.key === 'F3') { e.preventDefault(); window.location.href = '/'; }
      if (e.key === 'F5') { e.preventDefault(); document.getElementById('prev-day').click(); }
      if (e.key === 'F6') { e.preventDefault(); document.getElementById('next-day').click(); }
    });

    updateDateUI();
    fetchStats();
  </script>
</body>
</html>
