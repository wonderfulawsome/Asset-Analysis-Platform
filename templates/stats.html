<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PASSIVE ANALYTICS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #06060a;
      --surface: #0c0c12;
      --surface2: #131318;
      --border: #1e1e28;
      --text: #c8c8d0;
      --text-hi: #ffffff;
      --dim: #4a4a58;
      --orange: #ff8c00;
      --orange-glow: rgba(255,140,0,0.15);
      --green: #00d26a;
      --blue: #448aff;
      --red: #ff3b30;
      --yellow: #ffd600;
      --mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'Menlo', monospace;
      --sans: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ═══ AMBIENT BACKGROUND ═══ */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 900px; height: 500px;
      background: radial-gradient(ellipse, rgba(255,140,0,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: ambientBreath 8s ease-in-out infinite;
    }
    @keyframes ambientBreath {
      0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
      50% { opacity: 1; transform: translateX(-50%) scale(1.15); }
    }

    /* ═══ TOP BAR ═══ */
    .topbar {
      background: rgba(12,12,18,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 2px solid var(--orange);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 44px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .topbar-tag {
      background: var(--orange);
      color: #000;
      font-family: var(--mono);
      font-weight: 800;
      font-size: 11px;
      letter-spacing: 2px;
      padding: 4px 10px;
    }
    .topbar-sub {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 1px;
    }
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .topbar-clock {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--orange);
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 8px rgba(255,140,0,0.3);
    }
    .topbar-link {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--dim);
      text-decoration: none;
      padding: 4px 12px;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }
    .topbar-link:hover {
      color: var(--orange);
      border-color: var(--orange);
      box-shadow: 0 0 12px rgba(255,140,0,0.15);
    }

    /* ═══ LAYOUT ═══ */
    .layout {
      position: relative;
      z-index: 1;
      padding: 16px 24px;
    }
    @media (min-width: 1400px) { .layout { padding: 20px 48px; } }
    @media (max-width: 640px) { .layout { padding: 10px 10px; } }

    /* ═══ COMMAND BAR ═══ */
    .cmd-bar {
      display: flex;
      align-items: stretch;
      background: var(--border);
      gap: 1px;
      margin-bottom: 14px;
    }
    .cmd-btn {
      background: var(--surface);
      border: none;
      color: var(--dim);
      font-family: var(--mono);
      font-size: 14px;
      cursor: pointer;
      padding: 0 20px;
      transition: all 0.15s;
      line-height: 42px;
    }
    .cmd-btn:hover { background: var(--surface2); color: var(--orange); }
    .cmd-btn:active { transform: scale(0.95); }
    .cmd-date {
      flex: 1;
      background: var(--surface);
      text-align: center;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      color: var(--text-hi);
      line-height: 42px;
      letter-spacing: 0.5px;
    }
    .cmd-refresh {
      background: var(--surface);
      border: none;
      color: var(--dim);
      cursor: pointer;
      padding: 0 16px;
      display: flex;
      align-items: center;
      transition: all 0.15s;
    }
    .cmd-refresh:hover { color: var(--orange); background: var(--surface2); }
    .cmd-refresh.spinning svg { animation: spin 0.5s linear infinite; }

    /* ═══ PANEL ═══ */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .panel:hover {
      border-color: #2a2a38;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .panel-label {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      color: var(--orange);
      letter-spacing: 1px;
    }
    .panel-tag {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 0.5px;
    }
    .panel-body {
      padding: 20px;
    }
    @media (min-width: 1200px) { .panel-body { padding: 28px; } }

    /* ═══ KPI GRID ═══ */
    .kpi-panel { margin-bottom: 14px; }
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
    }
    @media (max-width: 640px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    }
    .kpi-cell {
      background: var(--surface);
      padding: 26px 22px;
      position: relative;
      transition: background 0.3s;
    }
    .kpi-cell:hover { background: var(--surface2); }
    .kpi-cell::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      transition: box-shadow 0.3s;
    }
    .kpi-cell:nth-child(1)::before { background: var(--orange); }
    .kpi-cell:nth-child(2)::before { background: var(--blue); }
    .kpi-cell:nth-child(3)::before { background: var(--green); }
    .kpi-cell:nth-child(4)::before { background: var(--yellow); }
    .kpi-cell:nth-child(1):hover::before { box-shadow: 0 0 16px rgba(255,140,0,0.4); }
    .kpi-cell:nth-child(2):hover::before { box-shadow: 0 0 16px rgba(68,138,255,0.4); }
    .kpi-cell:nth-child(3):hover::before { box-shadow: 0 0 16px rgba(0,210,106,0.4); }
    .kpi-cell:nth-child(4):hover::before { box-shadow: 0 0 16px rgba(255,214,0,0.4); }
    .kpi-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--dim);
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }
    @media (min-width: 1200px) {
      .kpi-label { font-size: 12px; margin-bottom: 14px; }
      .kpi-cell { padding: 32px 28px; }
    }
    .kpi-val {
      font-family: var(--mono);
      font-size: 40px;
      font-weight: 700;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    @media (min-width: 1200px) { .kpi-val { font-size: 52px; } }
    .kpi-val.c-orange { color: var(--orange); text-shadow: 0 0 20px rgba(255,140,0,0.2); }
    .kpi-val.c-blue { color: var(--blue); text-shadow: 0 0 20px rgba(68,138,255,0.2); }
    .kpi-val.c-green { color: var(--green); text-shadow: 0 0 20px rgba(0,210,106,0.2); }
    .kpi-val.c-yellow { color: var(--yellow); text-shadow: 0 0 20px rgba(255,214,0,0.2); }
    .kpi-unit {
      font-family: var(--sans);
      font-size: 13px;
      color: var(--dim);
      margin-left: 3px;
    }

    /* ═══ GRID ROW ═══ */
    .grid-row {
      display: grid;
      grid-template-columns: 1fr 1.6fr;
      gap: 14px;
      margin-bottom: 14px;
    }
    .grid-row .panel { margin-bottom: 0; }
    @media (max-width: 640px) {
      .grid-row { grid-template-columns: 1fr; }
    }

    /* ═══ RATIO ═══ */
    .ratio-track {
      height: 10px;
      display: flex;
      overflow: hidden;
      background: rgba(255,255,255,0.03);
      margin-bottom: 18px;
    }
    @media (min-width: 1200px) { .ratio-track { height: 14px; margin-bottom: 22px; } }
    .ratio-new {
      background: linear-gradient(90deg, #00b85c, var(--green));
      height: 100%;
      transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 0 10px rgba(0,210,106,0.2);
    }
    .ratio-ret {
      background: linear-gradient(90deg, var(--blue), #6ea8ff);
      height: 100%;
      transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 0 10px rgba(68,138,255,0.2);
    }
    .ratio-legend {
      display: flex;
      justify-content: space-between;
    }
    .ratio-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--dim);
    }
    .ratio-dot { width: 10px; height: 10px; border-radius: 2px; }
    .ratio-dot.g { background: var(--green); box-shadow: 0 0 6px rgba(0,210,106,0.3); }
    .ratio-dot.b { background: var(--blue); box-shadow: 0 0 6px rgba(68,138,255,0.3); }
    .ratio-pct {
      font-family: var(--mono);
      font-weight: 700;
      font-size: 16px;
      color: var(--text-hi);
    }

    /* ═══ 7-DAY CHART ═══ */
    .chart-bars {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      height: 200px;
    }
    @media (min-width: 1200px) { .chart-bars { height: 280px; } }
    .bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      height: 100%;
      justify-content: flex-end;
    }
    .bar-val {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.3s, transform 0.3s;
    }
    .bar-val.show { opacity: 1; transform: translateY(0); }
    @media (min-width: 1200px) { .bar-val { font-size: 14px; } }
    .bar-fill {
      width: 100%;
      min-height: 2px;
      background: linear-gradient(to top, rgba(255,140,0,0.15), rgba(255,140,0,0.30));
      border-radius: 2px 2px 0 0;
      transition: height 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
    }
    .bar-fill.today {
      background: linear-gradient(to top, #cc7000, var(--orange), #ffaa33);
      box-shadow: 0 0 20px rgba(255,140,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
    }
    .bar-fill:hover {
      filter: brightness(1.2);
    }
    .bar-day {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--dim);
      transition: color 0.2s;
    }
    .bar-col:last-child .bar-day { color: var(--orange); font-weight: 700; }
    @media (min-width: 1200px) { .bar-day { font-size: 12px; } }

    /* ═══ STATUS BAR ═══ */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--orange);
    }
    .status-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--dim);
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px rgba(0,210,106,0.5);
      animation: pulse 2s ease-in-out infinite;
    }
    .status-live { color: var(--green); font-weight: 700; }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px rgba(0,210,106,0.5); }
      50% { opacity: 0.4; box-shadow: 0 0 4px rgba(0,210,106,0.2); }
    }

    /* ═══ FUNCTION BAR ═══ */
    .fn-bar {
      display: flex;
      gap: 1px;
      background: var(--border);
      margin-top: 14px;
    }
    .fn-key {
      flex: 1;
      background: var(--surface);
      text-align: center;
      padding: 7px 0;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--dim);
      cursor: default;
      user-select: none;
      transition: background 0.15s, color 0.15s;
    }
    .fn-key:hover { background: var(--surface2); color: var(--text); }
    .fn-key span { color: var(--orange); font-weight: 700; }
    @media (max-width: 640px) { .fn-bar { display: none; } }

    /* ═══ LOADING ═══ */
    .loading-wrap {
      text-align: center;
      padding: 100px 0;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--dim);
    }
    .ld-spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 14px;
      box-shadow: 0 0 12px rgba(255,140,0,0.15);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ═══ STAGGER REVEAL ═══ */
    .reveal {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1),
                  transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .reveal.show {
      opacity: 1;
      transform: translateY(0);
    }
    .reveal.d1 { transition-delay: 0.05s; }
    .reveal.d2 { transition-delay: 0.15s; }
    .reveal.d3 { transition-delay: 0.25s; }
    .reveal.d4 { transition-delay: 0.35s; }
  </style>
</head>
<body>

  <!-- ── TOP BAR ── -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-tag">PASSIVE</span>
      <span class="topbar-sub">ANALYTICS</span>
    </div>
    <div class="topbar-right">
      <span class="topbar-clock" id="live-clock"></span>
      <a href="/" class="topbar-link">← 메인</a>
    </div>
  </div>

  <div class="layout">

    <!-- ── COMMAND BAR ── -->
    <div class="cmd-bar">
      <button class="cmd-btn" id="prev-day">◀</button>
      <div class="cmd-date" id="date-label"></div>
      <button class="cmd-btn" id="next-day">▶</button>
      <button class="cmd-refresh" id="refresh-btn" title="새로고침">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 1v5h5"/><path d="M1 6C2.1 3.2 4.8 1.3 8 1.3c3.7 0 6.7 3 6.7 6.7s-3 6.7-6.7 6.7c-2.7 0-5-1.6-6.1-3.9"/></svg>
      </button>
    </div>

    <!-- ── LOADING ── -->
    <div id="loading" class="loading-wrap">
      <div class="ld-spinner"></div>
      데이터 로딩 중 ...
    </div>

    <!-- ── CONTENT ── -->
    <div id="stats-content" style="display:none;">

      <!-- KPI -->
      <div class="kpi-panel panel reveal d1">
        <div class="panel-head">
          <span class="panel-label">핵심 지표</span>
          <span class="panel-tag">KEY METRICS</span>
        </div>
        <div class="kpi-grid">
          <div class="kpi-cell">
            <div class="kpi-label">DAU (오늘)</div>
            <div><span class="kpi-val c-orange" id="dau">0</span><span class="kpi-unit">명</span></div>
          </div>
          <div class="kpi-cell">
            <div class="kpi-label">MAU (월간)</div>
            <div><span class="kpi-val c-blue" id="mau">0</span><span class="kpi-unit">명</span></div>
          </div>
          <div class="kpi-cell">
            <div class="kpi-label">신규 사용자</div>
            <div><span class="kpi-val c-green" id="new-users">0</span><span class="kpi-unit">명</span></div>
          </div>
          <div class="kpi-cell">
            <div class="kpi-label">재방문 사용자</div>
            <div><span class="kpi-val c-yellow" id="returning-users">0</span><span class="kpi-unit">명</span></div>
          </div>
        </div>
      </div>

      <!-- Ratio + Chart -->
      <div class="grid-row">
        <div class="panel reveal d2">
          <div class="panel-head">
            <span class="panel-label">신규 vs 재방문</span>
            <span class="panel-tag">RATIO</span>
          </div>
          <div class="panel-body">
            <div class="ratio-track">
              <div class="ratio-new" id="ratio-new" style="width:0%"></div>
              <div class="ratio-ret" id="ratio-ret" style="width:0%"></div>
            </div>
            <div class="ratio-legend">
              <div class="ratio-item">
                <span class="ratio-dot g"></span>
                신규 <span class="ratio-pct" id="ratio-new-pct">0%</span>
              </div>
              <div class="ratio-item">
                <span class="ratio-dot b"></span>
                재방문 <span class="ratio-pct" id="ratio-ret-pct">0%</span>
              </div>
            </div>
          </div>
        </div>

        <div class="panel reveal d3">
          <div class="panel-head">
            <span class="panel-label">최근 7일 추이</span>
            <span class="panel-tag">DAU TREND</span>
          </div>
          <div class="panel-body">
            <div class="chart-bars" id="chart-bars"></div>
          </div>
        </div>
      </div>

      <!-- Status -->
      <div class="status-bar reveal d4">
        <div class="status-item">
          <span class="status-dot"></span>
          <span class="status-live">LIVE</span>
        </div>
        <div class="status-item" id="last-update"></div>
      </div>

      <!-- Fn keys -->
      <div class="fn-bar reveal d4">
        <div class="fn-key"><span>F1</span> 도움말</div>
        <div class="fn-key"><span>F2</span> 새로고침</div>
        <div class="fn-key"><span>F3</span> 메인</div>
        <div class="fn-key"><span>F5</span> 전일</div>
        <div class="fn-key"><span>F6</span> 익일</div>
      </div>

    </div>
  </div>

  <script>
    const API = '/api/tracking';

    /* ── Clock ── */
    function tickClock() {
      const now = new Date();
      const kst = new Date(now.getTime() + 9 * 3600000);
      const pad = n => String(n).padStart(2, '0');
      document.getElementById('live-clock').textContent =
        pad(kst.getUTCHours()) + ':' + pad(kst.getUTCMinutes()) + ':' + pad(kst.getUTCSeconds()) + ' KST';
    }
    setInterval(tickClock, 1000);
    tickClock();

    /* ── Date helpers ── */
    function getKSTToday() {
      const now = new Date();
      const kst = new Date(now.getTime() + 9 * 3600000);
      return new Date(kst.getUTCFullYear(), kst.getUTCMonth(), kst.getUTCDate());
    }
    let currentDate = getKSTToday();

    const pad2 = n => String(n).padStart(2, '0');
    const fmtDate = d => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
    const fmtMonth = d => `${d.getFullYear()}-${pad2(d.getMonth()+1)}`;
    const dayKo = ['일','월','화','수','목','금','토'];
    const fmtDisplay = d => `${d.getFullYear()}. ${d.getMonth()+1}. ${d.getDate()}. (${dayKo[d.getDay()]})`;

    function updateDateUI() {
      document.getElementById('date-label').textContent = fmtDisplay(currentDate);
    }

    /* ── Stagger reveal ── */
    function triggerReveal() {
      requestAnimationFrame(() => {
        document.querySelectorAll('.reveal').forEach(el => el.classList.add('show'));
      });
    }

    /* ── Fetch & Render ── */
    async function fetchStats() {
      const $ld = document.getElementById('loading');
      const $ct = document.getElementById('stats-content');
      $ld.style.display = '';
      $ct.style.display = 'none';
      document.querySelectorAll('.reveal').forEach(el => el.classList.remove('show'));

      try {
        const d = fmtDate(currentDate);
        const m = fmtMonth(currentDate);
        const res = await fetch(`${API}/stats?d=${d}&m=${m}`);
        const data = await res.json();

        /* KPI */
        animateNum('dau', data.dau ?? 0);
        animateNum('mau', data.mau ?? 0);
        animateNum('new-users', data.new_users ?? 0);
        animateNum('returning-users', data.returning_users ?? 0);

        /* Ratio */
        const total = (data.new_users || 0) + (data.returning_users || 0);
        const nPct = total > 0 ? Math.round((data.new_users / total) * 100) : 0;
        const rPct = total > 0 ? 100 - nPct : 0;
        document.getElementById('ratio-new').style.width = nPct + '%';
        document.getElementById('ratio-ret').style.width = rPct + '%';
        document.getElementById('ratio-new-pct').textContent = nPct + '%';
        document.getElementById('ratio-ret-pct').textContent = rPct + '%';

        /* Last update */
        const now = new Date();
        const kst = new Date(now.getTime() + 9 * 3600000);
        document.getElementById('last-update').textContent =
          'UPDATE ' + pad2(kst.getUTCHours()) + ':' + pad2(kst.getUTCMinutes()) + ' KST';

        $ld.style.display = 'none';
        $ct.style.display = '';
        triggerReveal();
        load7Day();
      } catch (err) {
        $ld.innerHTML = '<div style="color:var(--red)">데이터 로드 실패</div><div style="margin-top:8px;font-size:11px;color:var(--dim)">' + err.message + '</div>';
      }
    }

    /* ── Number animation (bounce-ease) ── */
    function animateNum(id, end) {
      const el = document.getElementById(id);
      if (end === 0) { el.textContent = '0'; return; }
      const t0 = performance.now();
      const dur = 700;
      (function tick(now) {
        const p = Math.min((now - t0) / dur, 1);
        /* overshoot ease */
        const ease = p < 1 ? 1 - Math.pow(1 - p, 4) : 1;
        el.textContent = Math.round(ease * end).toLocaleString();
        if (p < 1) requestAnimationFrame(tick);
      })(t0);
    }

    /* ── 7-day chart ── */
    async function load7Day() {
      const $c = document.getElementById('chart-bars');
      $c.innerHTML = '';

      const days = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date(currentDate);
        d.setDate(d.getDate() - i);
        days.push(d);
      }

      const results = await Promise.all(days.map(async d => {
        try {
          const r = await fetch(`${API}/stats?d=${fmtDate(d)}&m=${fmtMonth(d)}`);
          const j = await r.json();
          return { date: d, dau: j.dau ?? 0 };
        } catch { return { date: d, dau: 0 }; }
      }));

      const max = Math.max(...results.map(r => r.dau), 1);

      results.forEach((r, i) => {
        const col = document.createElement('div');
        col.className = 'bar-col';

        const val = document.createElement('div');
        val.className = 'bar-val';
        val.textContent = r.dau;

        const bar = document.createElement('div');
        bar.className = 'bar-fill' + (i === results.length - 1 ? ' today' : '');
        bar.style.height = '0%';

        const lbl = document.createElement('div');
        lbl.className = 'bar-day';
        lbl.textContent = dayKo[r.date.getDay()];

        col.appendChild(val);
        col.appendChild(bar);
        col.appendChild(lbl);
        $c.appendChild(col);

        requestAnimationFrame(() => {
          setTimeout(() => {
            bar.style.height = Math.max((r.dau / max) * 100, 4) + '%';
            val.classList.add('show');
          }, 150 + i * 80);
        });
      });
    }

    /* ── Navigation ── */
    document.getElementById('prev-day').addEventListener('click', () => {
      currentDate.setDate(currentDate.getDate() - 1);
      updateDateUI();
      fetchStats();
    });
    document.getElementById('next-day').addEventListener('click', () => {
      if (currentDate < getKSTToday()) {
        currentDate.setDate(currentDate.getDate() + 1);
        updateDateUI();
        fetchStats();
      }
    });
    document.getElementById('refresh-btn').addEventListener('click', function () {
      this.classList.add('spinning');
      fetchStats().finally(() => setTimeout(() => this.classList.remove('spinning'), 500));
    });

    /* ── Keyboard shortcuts ── */
    document.addEventListener('keydown', e => {
      if (e.key === 'F2') { e.preventDefault(); document.getElementById('refresh-btn').click(); }
      if (e.key === 'F3') { e.preventDefault(); window.location.href = '/'; }
      if (e.key === 'F5') { e.preventDefault(); document.getElementById('prev-day').click(); }
      if (e.key === 'F6') { e.preventDefault(); document.getElementById('next-day').click(); }
    });

    /* ── Init ── */
    updateDateUI();
    fetchStats();
  </script>
</body>
</html>
