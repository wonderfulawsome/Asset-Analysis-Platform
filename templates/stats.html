<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PASSIVE ANALYTICS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border: #222222;
      --border-hi: #333333;
      --text: #cccccc;
      --text-hi: #ffffff;
      --dim: #555555;
      --orange: #ff8c00;
      --orange-dim: rgba(255,140,0,0.10);
      --green: #00d26a;
      --green-dim: rgba(0,210,106,0.10);
      --blue: #448aff;
      --blue-dim: rgba(68,138,255,0.10);
      --red: #ff3b30;
      --yellow: #ffd600;
      --mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'Menlo', monospace;
      --sans: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ═══════════════════════════════════════════
       TOP BAR — Bloomberg signature orange line
       ═══════════════════════════════════════════ */
    .topbar {
      background: #111111;
      border-bottom: 2px solid var(--orange);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 42px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .topbar-tag {
      background: var(--orange);
      color: #000;
      font-family: var(--mono);
      font-weight: 800;
      font-size: 11px;
      letter-spacing: 1.5px;
      padding: 3px 8px;
    }
    .topbar-sub {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 0.5px;
    }
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .topbar-clock {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--orange);
      font-variant-numeric: tabular-nums;
    }
    .topbar-link {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--dim);
      text-decoration: none;
      padding: 3px 10px;
      border: 1px solid var(--border);
      transition: all 0.12s;
    }
    .topbar-link:hover {
      color: var(--orange);
      border-color: var(--orange);
    }

    /* ═══════════════════════════════════════════
       LAYOUT
       ═══════════════════════════════════════════ */
    .layout {
      max-width: 1100px;
      margin: 0 auto;
      padding: 12px;
    }

    /* ═══════════════════════════════════════════
       COMMAND BAR — Date Navigation
       ═══════════════════════════════════════════ */
    .cmd-bar {
      display: flex;
      align-items: stretch;
      background: var(--border);
      gap: 1px;
      margin-bottom: 12px;
    }
    .cmd-btn {
      background: var(--surface);
      border: none;
      color: var(--dim);
      font-family: var(--mono);
      font-size: 14px;
      cursor: pointer;
      padding: 0 18px;
      transition: all 0.1s;
      line-height: 40px;
    }
    .cmd-btn:hover { background: var(--surface2); color: var(--orange); }
    .cmd-date {
      flex: 1;
      background: var(--surface);
      text-align: center;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      color: var(--text-hi);
      line-height: 40px;
      letter-spacing: 0.5px;
    }
    .cmd-refresh {
      background: var(--surface);
      border: none;
      color: var(--dim);
      cursor: pointer;
      padding: 0 14px;
      display: flex;
      align-items: center;
      transition: all 0.1s;
    }
    .cmd-refresh:hover { color: var(--orange); background: var(--surface2); }
    .cmd-refresh.spinning svg { animation: spin 0.5s linear infinite; }

    /* ═══════════════════════════════════════════
       PANEL — Terminal window style
       ═══════════════════════════════════════════ */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .panel-label {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      color: var(--orange);
      letter-spacing: 0.8px;
    }
    .panel-tag {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--dim);
    }
    .panel-body {
      padding: 14px;
    }

    /* ═══════════════════════════════════════════
       KPI GRID
       ═══════════════════════════════════════════ */
    .kpi-panel { margin-bottom: 12px; }
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
    }
    @media (max-width: 640px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    }
    .kpi-cell {
      background: var(--surface);
      padding: 18px 14px;
      position: relative;
    }
    .kpi-cell::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }
    .kpi-cell:nth-child(1)::before { background: var(--orange); }
    .kpi-cell:nth-child(2)::before { background: var(--blue); }
    .kpi-cell:nth-child(3)::before { background: var(--green); }
    .kpi-cell:nth-child(4)::before { background: var(--yellow); }
    .kpi-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--dim);
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .kpi-val {
      font-family: var(--mono);
      font-size: 34px;
      font-weight: 700;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .kpi-val.c-orange { color: var(--orange); }
    .kpi-val.c-blue { color: var(--blue); }
    .kpi-val.c-green { color: var(--green); }
    .kpi-val.c-yellow { color: var(--yellow); }
    .kpi-unit {
      font-family: var(--sans);
      font-size: 12px;
      color: var(--dim);
      margin-left: 2px;
    }

    /* ═══════════════════════════════════════════
       DESKTOP TWO-COLUMN
       ═══════════════════════════════════════════ */
    .grid-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    .grid-row .panel { margin-bottom: 0; }
    @media (max-width: 640px) {
      .grid-row { grid-template-columns: 1fr; gap: 12px; }
    }

    /* ═══════════════════════════════════════════
       RATIO
       ═══════════════════════════════════════════ */
    .ratio-track {
      height: 6px;
      display: flex;
      overflow: hidden;
      background: rgba(255,255,255,0.03);
      margin-bottom: 14px;
    }
    .ratio-new {
      background: var(--green);
      height: 100%;
      transition: width 0.7s ease;
    }
    .ratio-ret {
      background: var(--blue);
      height: 100%;
      transition: width 0.7s ease;
    }
    .ratio-legend {
      display: flex;
      justify-content: space-between;
    }
    .ratio-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--dim);
    }
    .ratio-dot {
      width: 8px; height: 8px;
    }
    .ratio-dot.g { background: var(--green); }
    .ratio-dot.b { background: var(--blue); }
    .ratio-pct {
      font-family: var(--mono);
      font-weight: 700;
      color: var(--text);
    }

    /* ═══════════════════════════════════════════
       7-DAY CHART
       ═══════════════════════════════════════════ */
    .chart-bars {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 140px;
    }
    .bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      height: 100%;
      justify-content: flex-end;
    }
    .bar-val {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .bar-fill {
      width: 100%;
      min-height: 2px;
      background: rgba(255,140,0,0.25);
      transition: height 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .bar-fill.today {
      background: var(--orange);
      box-shadow: 0 0 12px rgba(255,140,0,0.25);
    }
    .bar-day {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--dim);
    }

    /* ═══════════════════════════════════════════
       STATUS BAR
       ═══════════════════════════════════════════ */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--orange);
    }
    .status-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--dim);
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease-in-out infinite;
    }
    .status-live { color: var(--green); font-weight: 700; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ═══════════════════════════════════════════
       FUNCTION BAR (bottom)
       ═══════════════════════════════════════════ */
    .fn-bar {
      display: flex;
      gap: 1px;
      background: var(--border);
      margin-top: 12px;
    }
    .fn-key {
      flex: 1;
      background: var(--surface);
      text-align: center;
      padding: 6px 0;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--dim);
      cursor: default;
      user-select: none;
    }
    .fn-key span {
      color: var(--orange);
      font-weight: 700;
    }
    @media (max-width: 640px) {
      .fn-bar { display: none; }
    }

    /* ═══════════════════════════════════════════
       LOADING
       ═══════════════════════════════════════════ */
    .loading-wrap {
      text-align: center;
      padding: 80px 0;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--dim);
    }
    .ld-spinner {
      width: 24px; height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ═══════════════════════════════════════════
       ANIMATION
       ═══════════════════════════════════════════ */
    .fade-in {
      opacity: 0;
      transform: translateY(4px);
      animation: fadeUp 0.3s ease forwards;
    }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <!-- ── TOP BAR ── -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-tag">PASSIVE</span>
      <span class="topbar-sub">ANALYTICS</span>
    </div>
    <div class="topbar-right">
      <span class="topbar-clock" id="live-clock"></span>
      <a href="/" class="topbar-link">← 메인</a>
    </div>
  </div>

  <div class="layout">

    <!-- ── COMMAND BAR ── -->
    <div class="cmd-bar">
      <button class="cmd-btn" id="prev-day">◀</button>
      <div class="cmd-date" id="date-label"></div>
      <button class="cmd-btn" id="next-day">▶</button>
      <button class="cmd-refresh" id="refresh-btn" title="새로고침">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 1v5h5"/><path d="M1 6C2.1 3.2 4.8 1.3 8 1.3c3.7 0 6.7 3 6.7 6.7s-3 6.7-6.7 6.7c-2.7 0-5-1.6-6.1-3.9"/></svg>
      </button>
    </div>

    <!-- ── LOADING ── -->
    <div id="loading" class="loading-wrap">
      <div class="ld-spinner"></div>
      데이터 로딩 중 ...
    </div>

    <!-- ── CONTENT ── -->
    <div id="stats-content" style="display:none;">

      <!-- KPI -->
      <div class="kpi-panel panel fade-in">
        <div class="panel-head">
          <span class="panel-label">핵심 지표</span>
          <span class="panel-tag">KEY METRICS</span>
        </div>
        <div class="kpi-grid">
          <div class="kpi-cell">
            <div class="kpi-label">DAU (오늘)</div>
            <div><span class="kpi-val c-orange" id="dau">0</span><span class="kpi-unit">명</span></div>
          </div>
          <div class="kpi-cell">
            <div class="kpi-label">MAU (월간)</div>
            <div><span class="kpi-val c-blue" id="mau">0</span><span class="kpi-unit">명</span></div>
          </div>
          <div class="kpi-cell">
            <div class="kpi-label">신규 사용자</div>
            <div><span class="kpi-val c-green" id="new-users">0</span><span class="kpi-unit">명</span></div>
          </div>
          <div class="kpi-cell">
            <div class="kpi-label">재방문 사용자</div>
            <div><span class="kpi-val c-yellow" id="returning-users">0</span><span class="kpi-unit">명</span></div>
          </div>
        </div>
      </div>

      <!-- Two-column: Ratio + Chart -->
      <div class="grid-row fade-in">

        <!-- Ratio panel -->
        <div class="panel">
          <div class="panel-head">
            <span class="panel-label">신규 vs 재방문</span>
            <span class="panel-tag">RATIO</span>
          </div>
          <div class="panel-body">
            <div class="ratio-track">
              <div class="ratio-new" id="ratio-new" style="width:0%"></div>
              <div class="ratio-ret" id="ratio-ret" style="width:0%"></div>
            </div>
            <div class="ratio-legend">
              <div class="ratio-item">
                <span class="ratio-dot g"></span>
                신규 <span class="ratio-pct" id="ratio-new-pct">0%</span>
              </div>
              <div class="ratio-item">
                <span class="ratio-dot b"></span>
                재방문 <span class="ratio-pct" id="ratio-ret-pct">0%</span>
              </div>
            </div>
          </div>
        </div>

        <!-- 7-day chart panel -->
        <div class="panel">
          <div class="panel-head">
            <span class="panel-label">최근 7일 추이</span>
            <span class="panel-tag">DAU TREND</span>
          </div>
          <div class="panel-body">
            <div class="chart-bars" id="chart-bars"></div>
          </div>
        </div>

      </div>

      <!-- Status bar -->
      <div class="status-bar fade-in">
        <div class="status-item">
          <span class="status-dot"></span>
          <span class="status-live">LIVE</span>
        </div>
        <div class="status-item" id="last-update"></div>
      </div>

      <!-- Function keys -->
      <div class="fn-bar fade-in">
        <div class="fn-key"><span>F1</span> 도움말</div>
        <div class="fn-key"><span>F2</span> 새로고침</div>
        <div class="fn-key"><span>F3</span> 메인</div>
        <div class="fn-key"><span>F5</span> 전일</div>
        <div class="fn-key"><span>F6</span> 익일</div>
      </div>

    </div>
  </div>

  <script>
    const API = '/api/tracking';

    /* ── Clock ── */
    function tickClock() {
      const now = new Date();
      const kst = new Date(now.getTime() + 9 * 3600000);
      const pad = n => String(n).padStart(2, '0');
      document.getElementById('live-clock').textContent =
        pad(kst.getUTCHours()) + ':' + pad(kst.getUTCMinutes()) + ':' + pad(kst.getUTCSeconds()) + ' KST';
    }
    setInterval(tickClock, 1000);
    tickClock();

    /* ── Date helpers ── */
    function getKSTToday() {
      const now = new Date();
      const kst = new Date(now.getTime() + 9 * 3600000);
      return new Date(kst.getUTCFullYear(), kst.getUTCMonth(), kst.getUTCDate());
    }
    let currentDate = getKSTToday();

    const pad2 = n => String(n).padStart(2, '0');
    const fmtDate = d => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
    const fmtMonth = d => `${d.getFullYear()}-${pad2(d.getMonth()+1)}`;
    const dayKo = ['일','월','화','수','목','금','토'];
    const fmtDisplay = d => `${d.getFullYear()}. ${d.getMonth()+1}. ${d.getDate()}. (${dayKo[d.getDay()]})`;

    function updateDateUI() {
      document.getElementById('date-label').textContent = fmtDisplay(currentDate);
    }

    /* ── Fetch & Render ── */
    async function fetchStats() {
      const $ld = document.getElementById('loading');
      const $ct = document.getElementById('stats-content');
      $ld.style.display = '';
      $ct.style.display = 'none';

      try {
        const d = fmtDate(currentDate);
        const m = fmtMonth(currentDate);
        const res = await fetch(`${API}/stats?d=${d}&m=${m}`);
        const data = await res.json();

        /* KPI */
        animateNum('dau', data.dau ?? 0);
        animateNum('mau', data.mau ?? 0);
        animateNum('new-users', data.new_users ?? 0);
        animateNum('returning-users', data.returning_users ?? 0);

        /* Ratio */
        const total = (data.new_users || 0) + (data.returning_users || 0);
        const nPct = total > 0 ? Math.round((data.new_users / total) * 100) : 0;
        const rPct = total > 0 ? 100 - nPct : 0;
        document.getElementById('ratio-new').style.width = nPct + '%';
        document.getElementById('ratio-ret').style.width = rPct + '%';
        document.getElementById('ratio-new-pct').textContent = nPct + '%';
        document.getElementById('ratio-ret-pct').textContent = rPct + '%';

        /* Last update */
        const now = new Date();
        const kst = new Date(now.getTime() + 9 * 3600000);
        document.getElementById('last-update').textContent =
          'UPDATE ' + pad2(kst.getUTCHours()) + ':' + pad2(kst.getUTCMinutes()) + ' KST';

        $ld.style.display = 'none';
        $ct.style.display = '';
        load7Day();
      } catch (err) {
        $ld.innerHTML = '<div style="color:var(--red)">데이터 로드 실패</div><div style="margin-top:8px;font-size:11px;color:var(--dim)">' + err.message + '</div>';
      }
    }

    /* ── Number animation ── */
    function animateNum(id, end) {
      const el = document.getElementById(id);
      if (end === 0) { el.textContent = '0'; return; }
      const t0 = performance.now();
      (function tick(now) {
        const p = Math.min((now - t0) / 500, 1);
        const ease = 1 - Math.pow(1 - p, 3);
        el.textContent = Math.round(ease * end).toLocaleString();
        if (p < 1) requestAnimationFrame(tick);
      })(t0);
    }

    /* ── 7-day chart ── */
    async function load7Day() {
      const $c = document.getElementById('chart-bars');
      $c.innerHTML = '';

      const days = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date(currentDate);
        d.setDate(d.getDate() - i);
        days.push(d);
      }

      const results = await Promise.all(days.map(async d => {
        try {
          const r = await fetch(`${API}/stats?d=${fmtDate(d)}&m=${fmtMonth(d)}`);
          const j = await r.json();
          return { date: d, dau: j.dau ?? 0 };
        } catch { return { date: d, dau: 0 }; }
      }));

      const max = Math.max(...results.map(r => r.dau), 1);

      results.forEach((r, i) => {
        const col = document.createElement('div');
        col.className = 'bar-col';

        const val = document.createElement('div');
        val.className = 'bar-val';
        val.textContent = r.dau;

        const bar = document.createElement('div');
        bar.className = 'bar-fill' + (i === results.length - 1 ? ' today' : '');
        bar.style.height = '0%';

        const lbl = document.createElement('div');
        lbl.className = 'bar-day';
        lbl.textContent = dayKo[r.date.getDay()];

        col.appendChild(val);
        col.appendChild(bar);
        col.appendChild(lbl);
        $c.appendChild(col);

        requestAnimationFrame(() => {
          setTimeout(() => {
            bar.style.height = Math.max((r.dau / max) * 100, 3) + '%';
          }, i * 60);
        });
      });
    }

    /* ── Navigation ── */
    document.getElementById('prev-day').addEventListener('click', () => {
      currentDate.setDate(currentDate.getDate() - 1);
      updateDateUI();
      fetchStats();
    });
    document.getElementById('next-day').addEventListener('click', () => {
      if (currentDate < getKSTToday()) {
        currentDate.setDate(currentDate.getDate() + 1);
        updateDateUI();
        fetchStats();
      }
    });
    document.getElementById('refresh-btn').addEventListener('click', function () {
      this.classList.add('spinning');
      fetchStats().finally(() => setTimeout(() => this.classList.remove('spinning'), 500));
    });

    /* ── Keyboard shortcuts ── */
    document.addEventListener('keydown', e => {
      if (e.key === 'F2') { e.preventDefault(); document.getElementById('refresh-btn').click(); }
      if (e.key === 'F3') { e.preventDefault(); window.location.href = '/'; }
      if (e.key === 'F5') { e.preventDefault(); document.getElementById('prev-day').click(); }
      if (e.key === 'F6') { e.preventDefault(); document.getElementById('next-day').click(); }
    });

    /* ── Init ── */
    updateDateUI();
    fetchStats();
  </script>
</body>
</html>
